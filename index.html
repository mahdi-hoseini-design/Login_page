<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      border: none;
      outline: none;
      box-sizing: border-box;
      font-family: tahoma;
    }

    body {
      display: flex;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-color: black;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url(img/66.jpg);
      background-size: cover;
      background-position: center;
      z-index: 1;
      filter: blur(8px);
    }

    .container {
      width: 90%;
      max-width: 1200px;
      height: 75vh;
      background-image: url(img/66.jpg);
      background-size: cover;
      background-position: center;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(5px);
      overflow: hidden;
      position: relative;
      z-index: 2;
      display: flex;
      gap: 40px;
      color: white;
    }

    .left {
      width: 50%;
      padding: 50px;
      position: relative;
    }

    h1 {
      margin-top: 100px;
      color: #fff;
      font-size: 46px;
      font-weight: bold;
      line-height: 1.2;
    }

    p {
      color: #fff;
      margin-top: 20px;
      font-size: 16px;
    }

    .social-btn {
      display: flex;
      margin-top: 30px;
      gap: 20px;
    }

    .social-btn i {
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      transition: all ease 0.3s;
    }

    .social-btn i:hover {
      transform: translateY(-3px);
    }

    .right {
      width: 50%;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    h3 {
      text-align: center;
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 60px;
    }

    .form {
      gap: 20px;
      direction: ltr;
    }

    .form-group {
      margin-bottom: 30px;
      position: relative;
    }

    .form-group label {
      position: absolute;
      left: 0;
      top: -15px;
      color: #fff;
      font-size: 18px;
    }

    .form-group input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.7);
      padding: 10px 40px 10px 10px;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    .form-group .icon {
      top: 10px;
      color: #fff;
      right: 10px;
      position: absolute;
    }

    .remember-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      color: #fff;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
    }

    .checkbox-container input {
      margin-left: 10px;
    }

    .forget {
      color: #fff;
      text-decoration: none;
    }

    .login-button {
      background: linear-gradient(to right, #f37b6b, #f6849dc8);
      border: none;
      border-radius: 5px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      width: 100%;
      margin: 30px 0;
      transition: all 0.3s ease;
      height: 40px;
    }

    .login-button:hover {
      transform: translate(-3px);
      box-shadow: 0 5px 15px rgba(255, 107, 139, 0.4);
    }

    .sign-up {
      text-align: center;
      color: #fff;
    }

    .sign-up a {
      color: #f6849dc8;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <h1>WELCOME! <br> TO OUR WEBSITE</h1>
      <p>SIGN UP AND USE YOUR IMAGINATING TO CREAT ART . ENJOY EXPLORING.</p>
      <div class="social-btn">
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-youtube"></i>
        <i class="fa-brands fa-linkedin"></i>
        <i class="fa-brands fa-github"></i>
      </div>
    </div>

    <div class="right">
      <form action="">
        <h3>ENTER TO YOUR ACCOUNT</h3>
        <div class="form">
          <div class="form-group">
            <label for="">NAME</label>
            <input type="text" required>
            <i class="fa-solid fa-user icon"></i>
          </div>

          <div class="form-group">
            <label for="">EMAIL</label>
            <input type="email" required>
            <i class="fa-solid fa-envelope icon"></i>
          </div>

          <div class="form-group">
            <label for="">PASSWORD</label>
            <input type="password" required>
            <i class="fa-solid fa-lock icon"></i>
          </div>

          <div class="form-group">
            <label for="">CONFIRM PASSWORD</label>
            <input type="confirm password" required>
            <i class="fa-solid fa-lock icon"></i>
          </div>
        </div>

        <div class="remember-section">
          <div class="checkbox-container">
            <input type="checkbox" id="remember">
            <label for="remember">REMEMBER ME</label>
          </div>
          <a href="" class="forget">FORGET YOUR PASSWORD ?</a>
        </div>

        <button type="submit" class="login-button">ENTER</button>

        <div class="sign-up">
          DONT YOU HAVE ACCOUNT ?
          <a href="">SIGN UP</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
