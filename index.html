<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <title>Login Page - Responsive</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      border: none;
      outline: none;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      display: flex;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
      background-color: black;
      position: relative;
      padding: 20px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url('IMG_20260530_035741.jpg');
      background-size: cover;
      background-position: center;
      z-index: 1;
      filter: blur(8px);
    }

    .container {
      width: 100%;
      max-width: 1200px;
      min-height: auto;
      background-image: url('IMG_20260530_035741.jpg');
      background-size: cover;
      background-position: center;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(5px);
      overflow: hidden;
      position: relative;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      color: white;
    }

    .left {
      flex: 1;
      min-width: 250px;
      padding: 40px 30px;
      position: relative;
    }

    h1 {
      margin-top: 60px;
      color: #fff;
      font-size: clamp(28px, 5vw, 46px);
      font-weight: bold;
      line-height: 1.2;
    }

    p {
      color: #fff;
      margin-top: 20px;
      font-size: clamp(12px, 3vw, 16px);
      line-height: 1.5;
    }

    .social-btn {
      display: flex;
      margin-top: 30px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .social-btn i {
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      transition: all ease 0.3s;
    }

    .social-btn i:hover {
      transform: translateY(-3px);
    }

    .right {
      flex: 1;
      min-width: 280px;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    h3 {
      text-align: center;
      color: #fff;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: bold;
      margin-bottom: 40px;
    }

    .form {
      width: 100%;
      gap: 20px;
      direction: ltr;
    }

    .form-group {
      margin-bottom: 30px;
      position: relative;
      width: 100%;
    }

    .form-group label {
      position: absolute;
      left: 0;
      top: -15px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.7);
      padding: 10px 40px 10px 5px;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
    }

    .form-group .icon {
      top: 10px;
      color: #fff;
      right: 5px;
      position: absolute;
      font-size: 16px;
    }

    .remember-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      color: #fff;
      flex-wrap: wrap;
      gap: 10px;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-container input {
      width: 16px;
      height: 16px;
      margin: 0;
      cursor: pointer;
    }

    .checkbox-container label {
      font-size: 12px;
      cursor: pointer;
    }

    .forget {
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      transition: opacity 0.3s;
    }

    .forget:hover {
      opacity: 0.7;
    }

    .login-button {
      background: linear-gradient(to right, #f37b6b, #f6849dc8);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin: 20px 0;
      transition: all 0.3s ease;
      height: 45px;
    }

    .login-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(255, 107, 139, 0.4);
    }

    .sign-up {
      text-align: center;
      color: #fff;
      font-size: 14px;
    }

    .sign-up a {
      color: #f6849dc8;
      text-decoration: none;
      font-weight: bold;
    }

    .sign-up a:hover {
      text-decoration: underline;
    }

    @media screen and (max-width: 900px) {
      .container {
        flex-direction: column;
        gap: 0;
      }

      .left {
        text-align: center;
        padding: 30px 20px;
      }

      .right {
        padding: 20px 25px 40px;
      }

      h1 {
        margin-top: 20px;
      }

      .social-btn {
        justify-content: center;
      }
    }

    @media screen and (max-width: 600px) {
      body {
        padding: 10px;
      }

      .container {
        border-radius: 15px;
      }

      .left {
        padding: 20px 15px;
      }

      .right {
        padding: 15px 18px 30px;
      }

      .form-group {
        margin-bottom: 25px;
      }

      .form-group label {
        font-size: 12px;
        top: -12px;
      }

      .form-group input {
        font-size: 14px;
        padding: 8px 35px 8px 5px;
      }

      .form-group .icon {
        font-size: 14px;
        top: 8px;
      }

      .remember-section {
        flex-direction: column;
        align-items: flex-start;
      }

      .login-button {
        height: 42px;
        font-size: 16px;
      }

      .sign-up {
        font-size: 12px;
      }

      .social-btn i {
        font-size: 18px;
      }
    }

    @media screen and (max-width: 400px) {
      .left, .right {
        padding: 15px;
      }

      h3 {
        margin-bottom: 25px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .checkbox-container label,
      .forget {
        font-size: 10px;
      }

      .login-button {
        height: 38px;
        font-size: 14px;
        margin: 15px 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <h1>WELCOME! <br> TO OUR WEBSITE</h1>
      <p>SIGN UP AND USE YOUR IMAGINATION TO CREATE ART. ENJOY EXPLORING.</p>
      <div class="social-btn">
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-youtube"></i>
        <i class="fa-brands fa-linkedin"></i>
        <i class="fa-brands fa-github"></i>
      </div>
    </div>

    <div class="right">
      <form action="#" method="post">
        <h3>ENTER TO YOUR ACCOUNT</h3>
        <div class="form">
          <div class="form-group">
            <label for="name">NAME</label>
            <input type="text" id="name" required>
            <i class="fa-solid fa-user icon"></i>
          </div>

          <div class="form-group">
            <label for="email">EMAIL</label>
            <input type="email" id="email" required>
            <i class="fa-solid fa-envelope icon"></i>
          </div>

          <div class="form-group">
            <label for="password">PASSWORD</label>
            <input type="password" id="password" required>
            <i class="fa-solid fa-lock icon"></i>
          </div>

          <div class="form-group">
            <label for="confirm">CONFIRM PASSWORD</label>
            <input type="password" id="confirm" required>
            <i class="fa-solid fa-lock icon"></i>
          </div>
        </div>

        <div class="remember-section">
          <div class="checkbox-container">
            <input type="checkbox" id="remember">
            <label for="remember">REMEMBER ME</label>
          </div>
          <a href="#" class="forget">FORGET YOUR PASSWORD ?</a>
        </div>

        <button type="submit" class="login-button">ENTER</button>

        <div class="sign-up">
          DON'T YOU HAVE AN ACCOUNT ?
          <a href="#">SIGN UP</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html><
